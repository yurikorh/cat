# 快捷指令配置：群消息与 macOS Shortcut 的对应关系
# 复制为 shortcuts.yaml 后按需修改。仅当消息与某条 trigger 完全一致时触发。
#
# 需要系统已安装 Shortcuts 命令行（macOS  Monterey 12.0+ 自带 shortcuts 命令）。
# 执行：shortcuts run <shortcut 名称>
#
shortcut_commands:
  - trigger: "车车状态"   # 用户发送这句话时
    shortcut: "查询充电状态"   # 运行名为 My Shortcut 的快捷指令
  - trigger: "关空调"
    shortcut: "关空调"
  - trigger: "开空调"
    shortcut: "开空调"